<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGM Clicker Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>SGM Oyun Alanı</h1>
        <p>Apple ve Android Uyumlu Clicker Simulator</p>
    </header>

    <div class="game-container">
        <div class="score-board" id="scoreDisplay">0 Coin</div>
        
        <button class="click-btn" id="clickerBtn">TIKLA!</button>
        
        <p class="cpc-text" id="cpcDisplay">Tık Başına: +1 Coin</p>
        <p class="cps-text" id="cpsDisplay">Saniyede: 0 Coin</p>
    </div>

    <div class="shop-container">
        <h3 class="shop-title">Geliştirmeler (Market)</h3>
        
        <div class="shop-item">
            <div class="item-info">
                <p>Bronz Parmak</p>
                <span>Tık gücünü +1 artırır</span>
            </div>
            <button class="buy-btn" id="upgrade1Btn">Fiyat: 50</button>
        </div>

        <div class="shop-item">
            <div class="item-info">
                <p>SGM Oto-Bot v1</p>
                <span>Saniyede +1 otomatik coin kazar</span>
            </div>
            <button class="buy-btn" id="autoclickBtn">Fiyat: 150</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
